name: Update F1 Data

on:
  # Run every Monday at 06:00 UTC (after most race weekends)
  schedule:
    - cron: "0 6 * * 1"
  # Run when pipeline code changes
  push:
    branches: [dev, main]
    paths:
      - "pipeline/**"
      - ".github/workflows/update-f1-data.yml"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      season:
        description: "F1 season year"
        required: false
        default: "2025"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: pipeline/cache
          key: fastf1-cache-${{ github.event.inputs.season || '2025' }}-${{ github.run_number }}
          restore-keys: |
            fastf1-cache-${{ github.event.inputs.season || '2025' }}-

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: uv sync

      - name: Run F1 data pipeline
        working-directory: pipeline
        run: |
          uv run python -m f1pipeline.main \
            --season ${{ github.event.inputs.season || '2025' }} \
            --output-dir ../data/generated

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update F1 data (${{ github.event.inputs.season || '2025' }})"
            git push
          fi
