name: Update F1 Data

on:
  # Run every Monday at 06:00 UTC (after most race weekends)
  schedule:
    - cron: "0 6 * * 1"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      season:
        description: "F1 season year"
        required: false
        default: "2025"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: pipeline/cache
          key: fastf1-cache-${{ github.event.inputs.season || '2025' }}-${{ github.run_number }}
          restore-keys: |
            fastf1-cache-${{ github.event.inputs.season || '2025' }}-

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: uv sync

      - name: Run F1 data pipeline
        working-directory: pipeline
        run: |
          uv run python -m f1pipeline.main \
            --season ${{ github.event.inputs.season || '2025' }} \
            --output-dir ../data/generated

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/generated/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update F1 data (${{ github.event.inputs.season || '2025' }})"
          title: "Update F1 qualifying data"
          body: |
            Automated update of F1 qualifying data from FastF1.

            - Season: ${{ github.event.inputs.season || '2025' }}
            - Triggered by: ${{ github.event_name }}

            Review the JSON changes and merge if data looks correct.
          branch: data-update/f1-${{ github.event.inputs.season || '2025' }}
          base: main
          labels: data-update
